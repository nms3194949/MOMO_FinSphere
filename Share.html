<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMO雙贏策略圖卡分享</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0A1221;
    color: #F6E6B0;
    font-family: "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container { text-align: center; padding: 30px; }
.logo { font-size: 32px; font-weight: bold; margin-bottom: 12px; }
.subtitle { font-size: 16px; opacity: .8; }
.loading { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
    <div class="logo">MOMO 雙贏策略</div>
    <div class="subtitle">MOMO雙贏策略圖卡分享</div>
    <div id="status" class="loading">正在初始化...</div>
</div>
<script>
const LIFF_ID = "2008793227-34uhksMV";
const GAS_URL = "https://script.google.com/macros/s/AKfycbzLTMeKabdT9vj3EuuqGBxIQY3m_b-zsQIFgpfgy6JZRYYHO_8uUeqy3Ay7m33UhvKK/exec";

async function shareCard() {
    // 讀取 URL 參數 set，預設 all
    const urlParams = new URLSearchParams(window.location.search);
    const set = urlParams.get('set') || 'all';

    document.getElementById("status").innerText = "正在載入圖卡清單...";

    const res  = await fetch(GAS_URL + '?api=getShareCards&set=' + encodeURIComponent(set));
    const data = await res.json();

    if (!data.ok || !data.cards || !data.cards.length) {
        document.getElementById("status").innerText = "❌ 無法載入圖卡清單";
        return;
    }

    const bubbles = data.cards.map(card => ({
        type: "bubble", size: "giga",
        hero: {
            type: "image",
            url: card.imageUrl,
            size: "full", aspectRatio: "3:4", aspectMode: "cover",
            action: { type: "uri", uri: card.actionUri }
        }
    }));

    const result = await liff.shareTargetPicker([{
        type: "flex",
        altText: "MOMO雙贏策略",
        contents: { type: "carousel", contents: bubbles }
    }]);

    if (result || result === null) liff.closeWindow();
}

async function main() {
    try {
        document.getElementById("status").innerText = "正在初始化分享系統...";
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isInClient()) {
            document.getElementById("status").innerText = "請從 LINE App 內開啟此功能";
            return;
        }
        if (!liff.isApiAvailable('shareTargetPicker')) {
            document.getElementById("status").innerText = "此環境不支援分享功能";
            return;
        }

        document.getElementById("status").innerText = "正在開啟分享視窗...";
        await shareCard();
    } catch (error) {
        console.error(error);
        document.getElementById("status").innerText = "❌ " + error.message;
    }
}

main();
</script>
</body>
</html>
