<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMO雙贏策略圖卡分享</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0A1221;
    color: #F6E6B0;
    font-family: "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container { text-align: center; padding: 30px; }
.logo { font-size: 32px; font-weight: bold; margin-bottom: 12px; }
.subtitle { font-size: 16px; opacity: .8; }
.loading { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
    <div class="logo">MOMO 雙贏策略</div>
    <div class="subtitle">MOMO雙贏策略圖卡分享</div>
    <div id="status" class="loading">正在初始化...</div>
</div>
<script>
const LIFF_ID = "2008793227-34uhksMV";
const GAS_URL = "https://script.google.com/macros/s/AKfycbzLTMeKabdT9vj3EuuqGBxIQY3m_b-zsQIFgpfgy6JZRYYHO_8uUeqy3Ay7m33UhvKK/exec";

// ==========================================
// 文字內容 → Flex bubble
// ==========================================
function buildTextBubble(text) {
  const BG   = '#0c152a';
  const GOLD = '#d2c696';
  const SUB  = '#8A9AB0';

  // ★ 先清除 \r，避免 Windows 換行符號造成判斷錯誤
  const lines = text.replace(/\r/g, '').split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const blocks = [];

  lines.forEach(line => {
    if (line.startsWith('•') || line.startsWith('-')) {
      blocks.push({
        type: 'box', layout: 'horizontal', margin: 'xs',
        contents: [
          { type: 'text', text: line[0], color: SUB, size: 'sm', flex: 1 },
          { type: 'text', text: line.substring(1).trim(), color: '#e0e8f0', size: 'sm', wrap: true, flex: 10 }
        ]
      });
    } else if (line.startsWith('📊') || line.startsWith('📈') || line.startsWith('⚖️')) {
      blocks.push({
        type: 'text', text: line,
        color: GOLD, size: 'sm', wrap: true, weight: 'bold', margin: 'md'
      });
    } else {
      const isSmall = line.length < 20 && !line.includes('。');
      blocks.push({
        type: 'text', text: line,
        color: '#e0e8f0',
        size: isSmall ? 'md' : 'sm',
        wrap: true,
        margin: blocks.length === 0 ? 'none' : 'sm'
      });
    }
  });

  return {
    type: 'bubble', size: 'giga',
    styles: {
      body:   { backgroundColor: BG },
      footer: { backgroundColor: BG }
    },
    body: {
      type: 'box', layout: 'vertical',
      paddingAll: '20px', spacing: 'none',
      contents: [
        { type: 'text', text: 'MOMO FinSphere', size: 'xs', color: GOLD, align: 'center', style: 'italic', weight: 'bold' },
        { type: 'separator', margin: 'sm', color: GOLD },
        { type: 'box', layout: 'vertical', margin: 'md', contents: blocks }
      ]
    }
  };
}

// ==========================================
// 主分享函式
// ==========================================
async function shareCard() {
  const urlParams = new URLSearchParams(window.location.search);
  const set = urlParams.get('set') || 'all';

  document.getElementById("status").innerText = "正在載入圖卡清單...";

  const res  = await fetch(GAS_URL + '?api=getShareCards&set=' + encodeURIComponent(set));
  const data = await res.json();

  if (!data.ok || !data.cards || !data.cards.length) {
    document.getElementById("status").innerText = "❌ 無法載入圖卡清單";
    return;
  }

  // 組圖片 bubbles
  const bubbles = data.cards.map(card => ({
    type: "bubble", size: "giga",
    hero: {
      type: "image",
      url: card.imageUrl,
      size: "full", aspectRatio: "3:4", aspectMode: "cover",
      action: { type: "uri", uri: card.actionUri }
    }
  }));

  // ★ 確認有沒有抓到文字（debug 用，確認正常後可移除）
  const cardWithText = data.cards.find(c => c.shareText && c.shareText.trim());
  document.getElementById("status").innerText = "文字: " + (cardWithText ? cardWithText.shareText.substring(0, 10) : '無');

  if (cardWithText) {
    bubbles.push(buildTextBubble(cardWithText.shareText));
  }

  const result = await liff.shareTargetPicker([{
    type: "flex",
    altText: "MOMO雙贏策略",
    contents: { type: "carousel", contents: bubbles }
  }]);

  if (result || result === null) liff.closeWindow();
}

// ==========================================
// 初始化
// ==========================================
async function main() {
  try {
    document.getElementById("status").innerText = "正在初始化分享系統...";
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isInClient()) {
      document.getElementById("status").innerText = "請從 LINE App 內開啟此功能";
      return;
    }
    if (!liff.isApiAvailable('shareTargetPicker')) {
      document.getElementById("status").innerText = "此環境不支援分享功能";
      return;
    }

    document.getElementById("status").innerText = "正在開啟分享視窗...";
    await shareCard();
  } catch (error) {
    console.error(error);
    document.getElementById("status").innerText = "❌ " + error.message;
  }
}

main();
</script>
</body>
</html>
