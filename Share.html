<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMO雙贏策略圖卡分享</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0A1221;
    color: #F6E6B0;
    font-family: "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container { text-align: center; padding: 30px; }
.logo { font-size: 32px; font-weight: bold; margin-bottom: 12px; }
.subtitle { font-size: 16px; opacity: .8; }
.loading { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
    <div class="logo">MOMO 雙贏策略</div>
    <div class="subtitle">MOMO雙贏策略圖卡分享</div>
    <div id="status" class="loading">正在初始化...</div>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = "2008793227-34uhksMV";
const BASE = "https://nms3194949.github.io/MOMO_FinSphere/";

async function shareCard() {
    const result = await liff.shareTargetPicker([
        {
            type: "flex",
            altText: "MOMO雙贏策略",
            contents: {
                type: "carousel",
                contents: [
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "MOMO-Fund.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: "https://liff.line.me/2008793227-34uhksMV" }
                        }
                    },
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "Cash_AB.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: BASE + "Cash_AB.png" }
                        }
                    },
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "Cash_ALLIANZ.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: BASE + "Cash_ALLIANZ.png" }
                        }
                    },
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "Cash_AMUNDI.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: BASE + "Cash_AMUNDI.png" }
                        }
                    },
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "Cash_BLK.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: BASE + "Cash_BLK.png" }
                        }
                    },
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "Cash_EASTSPRING.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: BASE + "Cash_EASTSPRING.png" }
                        }
                    },
                    {
                        type: "bubble", size: "giga",
                        hero: {
                            type: "image",
                            url: BASE + "Cash_SCHRODERS.png",
                            size: "full", aspectRatio: "3:4", aspectMode: "cover",
                            action: { type: "uri", uri: BASE + "Cash_SCHRODERS.png" }
                        }
                    }
                ]
            }
        }
    ]);

    if (result || result === null) {
        liff.closeWindow();
    }
}

async function main() {
    try {
        document.getElementById("status").innerText = "正在初始化分享系統...";
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isInClient()) {
            document.getElementById("status").innerText = "請從 LINE App 內開啟此功能";
            return;
        }
        if (!liff.isApiAvailable('shareTargetPicker')) {
            document.getElementById("status").innerText = "此環境不支援分享功能";
            return;
        }
        document.getElementById("status").innerText = "正在開啟分享視窗...";
        await shareCard();
    } catch (error) {
        console.error(error);
        document.getElementById("status").innerText = "❌ " + error.message;
    }
}

main();
</script>
</body>
</html>
